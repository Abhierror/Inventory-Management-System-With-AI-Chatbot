{% extends "inventory/base.html" %}
{% block title %}Confirm Delete – InventoryMS{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card">
      <div class="card-header"><i class="bi bi-exclamation-triangle text-danger me-2"></i>Confirm Delete</div>
      <div class="card-body">
        <p>Are you sure you want to delete <strong>{{ object }}</strong>? This action cannot be undone.</p>
        <form method="post" class="d-flex gap-2">
          {% csrf_token %}
          <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancel</a>
          <button type="submit" class="btn btn-danger">Delete</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
