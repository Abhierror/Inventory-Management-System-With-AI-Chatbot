<!DOCTYPE html>
{% load static %}
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – InventoryMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body style="background:var(--bg-body);min-height:100vh;display:flex;align-items:center;justify-content:center">

<div style="width:100%;max-width:380px;padding:1rem">
  <div class="card" style="box-shadow:var(--shadow-md)">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <div class="brand-icon mx-auto mb-2" style="width:48px;height:48px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.3rem">
          <i class="bi bi-box-seam"></i>
        </div>
        <h5 class="fw-700 mb-1" style="color:var(--text-primary)">InventoryMS</h5>
        <p class="text-muted" style="font-size:.82rem">Sign in to your account</p>
      </div>

      {% if form.errors %}
        <div class="alert alert-danger mb-3">Invalid username or password. Please try again.</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" autofocus required placeholder="Enter username">
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-primary w-100">Sign In</button>
      </form>

      <p class="text-center text-muted mt-3 mb-0" style="font-size:.76rem">
        Users are created via the admin panel.
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const saved = localStorage.getItem('ims-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
</script>
</body>
</html>
